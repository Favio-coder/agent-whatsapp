services:
  - type: web
    name: asistente-comuneros
    runtime: python
    repo: https://github.com/Favio-coder/agent-whatsapp.git
    branch: main
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
